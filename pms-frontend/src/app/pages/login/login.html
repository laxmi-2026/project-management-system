<div class="min-vh-100 d-flex align-items-center justify-content-center pms-auth-bg">
  <div class="bg-white" style="width: 100%; max-width: 420px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.25);">

    <div class="text-center pt-5 pb-3 px-4">
      <div style="font-size: 2.5rem;">📊</div>
      <h4 class="fw-bold mt-2 mb-1" style="color: var(--pms-slate-900);">Welcome Back</h4>
      <p class="text-muted mb-0" style="font-size: 0.88rem;">Sign in to Project Management System</p>
    </div>

    <div class="px-4 pb-4" style="text-align: left;">
      <div class="alert alert-danger" style="font-size: 0.85rem;" *ngIf="errorMessage">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size: 0.85rem;">Email Address</label>
          <input type="email" formControlName="email" placeholder="you@example.com"
                 class="form-control"
                 [class.is-invalid]="email.invalid && email.touched"
                 [class.is-valid]="email.valid && email.touched"
                 style="border-radius: var(--pms-radius); padding: 10px 12px;">
          <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
            <span *ngIf="email.errors?.['required']">Email is required</span>
            <span *ngIf="email.errors?.['email']">Enter a valid email address</span>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" style="font-size: 0.85rem;">Password</label>
          <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                   placeholder="Enter your password"
                   class="form-control"
                   [class.is-invalid]="password.invalid && password.touched"
                   style="border-radius: var(--pms-radius) 0 0 var(--pms-radius); padding: 10px 12px;">
            <button type="button" class="btn" style="border: 1px solid var(--pms-slate-300); border-radius: 0 var(--pms-radius) var(--pms-radius) 0;"
                    (click)="togglePassword()">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
          <div class="text-danger mt-1" style="font-size: 0.8rem;" *ngIf="password.invalid && password.touched">
            <span *ngIf="password.errors?.['required']">Password is required</span>
            <span *ngIf="password.errors?.['minlength']">Minimum 8 characters required</span>
          </div>
        </div>

        <button type="submit" class="pms-btn-primary w-100" style="border: none; padding: 11px;" [disabled]="loading">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="loading"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="mt-3 p-3" style="background: var(--pms-indigo-50); border-radius: var(--pms-radius); font-size: 0.8rem;">
        <i class="bi bi-info-circle me-1" style="color: var(--pms-indigo-600);"></i>
        <strong>Demo Admin:</strong> admin&#64;pms.com / Admin&#64;123
      </div>
    </div>

    <div class="text-center pb-4">
      <p class="text-muted mb-0" style="font-size: 0.85rem;">
        No account?
        <a routerLink="/register" class="fw-semibold text-decoration-none" style="color: var(--pms-indigo-600);">Create one here</a>
      </p>
    </div>
  </div>
</div>
